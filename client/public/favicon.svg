<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#2563eb"/>
  <!-- wand body: diagonal line from bottom-left to top-right -->
  <line x1="7" y1="25" x2="22" y2="10" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- star / sparkle at the tip -->
  <circle cx="23" cy="9" r="2" fill="white"/>
  <!-- small sparkles around tip -->
  <line x1="23" y1="5"  x2="23" y2="7"  stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="11" x2="23" y2="13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="9"  x2="21" y2="9"  stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="9"  x2="27" y2="9"  stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
