services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      NODE_ENV: production
      MAX_FILE_SIZE_MB: "50"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      nproc: 256
      nofile:
        soft: 4096
        hard: 4096
